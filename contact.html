    <div id="contact">
      <h1 id="section">Contact</h1>

      <div id="contact_row">
        <div class="contact_col">
          <div class="contact-info">
            <p>
              <i class="fa fa-map-marker"></i>
              Mount Lavinia ,Dehiwala, Sri Lanka.
            </p>

            <p>
              <i class="fa fa-envelope"></i>
              <a href="mailto:restoran@gmail.com"> info@restoran.com </a>
            </p>

            <p>
              <i class="fa fa-phone-square"></i>
              <a href="tel:011256743"> +94 11 256 7430</a>
            </p>
          </div>

          <h3>Follow us</h3>

          <div class="social-links">
            <a href=""><i class="fa fa-facebook-official fa-2x"></i></a>
            <a href=""><i class="fa fa-instagram fa-2x"></i></a>
            <a href=""><i class="fa fa-youtube-square fa-2x"></i></a>
          </div>
        </div>

        <div class="contact_col contact-form">
          <h2>Leave us a message</h2>

          <form>
            <div class="form-group">
              <div class="form-control">
                <label for="name">Full name</label>
                <input required id="name" name="name" type="text" />
              </div>
            </div>

            <div class="form-group">
              <div class="form-control">
                <label for="dob">Birthdate</label>
                <input required id="dob" type="date" name="dob" />
              </div>

              <div class="form-control">
                <label for="age">Age</label>
                <input required id="age" name="age" type="text" />
              </div>
            </div>

            <div class="form-group">
              <label class="group-label">Gender</label>

              <div class="form-control radio-control">
                <input
                  required
                  type="radio"
                  name="gender"
                  value="male"
                  id="male"
                  checked
                />
                <label for="male">Male</label>
              </div>

              <div class="form-control radio-control">
                <input
                  required
                  type="radio"
                  name="gender"
                  value="female"
                  id="female"
                />
                <label for="female">Female</label>
              </div>

              <div class="form-control radio-control">
                <input
                  required
                  type="radio"
                  name="gender"
                  value="other"
                  id="other"
                />
                <label for="other">Other</label>
              </div>
            </div>

            <div class="form-group">
              <div class="form-control">
                <label for="email">Email address</label>
                <input required name="email" type="email" id="email" />
              </div>

              <div class="form-control">
                <label for="phone-no">Contact number</label>
                <input required name="contact" type="text" id="phone-no" />
              </div>
            </div>

            <div class="form-group">
              <div class="form-control">
                <label for="message">Your message</label>
                <textarea
                  required
                  id="message"
                  rows="5"
                  name="message"
                ></textarea>
              </div>
            </div>

            <div class="form-control">
              <input type="submit" value="Send message" />
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- footer section -->
